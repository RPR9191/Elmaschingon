# Build configuration for Netlify
[build]
  command = "npm run build"
  publish = ".next"

# Redirect all routes to Next.js
[[redirects]]
  from = "/*"
  to = "/200"
  status = 200

# Static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"